        <script>
            document.addEventListener('DOMContentLoaded', function() {
                let closed = document.querySelector('.closed');
                let open = document.querySelector('.open');
                open.style.visibility = 'hidden';
                document.querySelector('.open').addEventListener('hover', function() {
                    if (open.style.visibility == 'visible') {
                        open.style.visibility = 'hidden';
                        closed.style.visibility = 'visible';
                        body.style.backgroundColor = 'blue'
                        }
                    else {
                        open.style.visibility = 'visible';
                        closed.style.visibility = 'hidden';
                        body.style.backgroundColor = 'red'
                        }
                });
            });

        </script>



        <h1 class="eyes"><a href="index.html"> Home </a> </h1>

        <div class="closed"> <img src="closed-eye.jpg"> </div>
