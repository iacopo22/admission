        <title>My Kubrick</title>

        <script>

         document.addEventListener('DOMContentLoaded', function() {
            let alert = document.querySelector('.alert');
            let stop = document.querySelector('.stop')
            let button = document.querySelector('.button')
            let movies = document.querySelector('.movies')

            let fullWidth = window.innerWidth;
            let fullHeight = window.innerHeight;

            function random() {
                    stop.style.position = "absolute";
                    stop.style.left = Math.round(Math.random() * fullWidth) + "px";
                    stop.style.top = Math.round(Math.random() * fullHeight) + "px";
                }

            alert.style.visibility = 'hidden';
            stop.style.visibility = 'hidden';
            movies.style.visibility = 'hidden';

            document.querySelector('.button').addEventListener('click', function() {
                if (alert.style.visibility = 'hidden') {
                    alert.style.visibility = 'visible'
                }

                stop.style.visibility = 'visible'
                myInterval = window.setInterval(random, 1500);

                document.querySelector('.stop').addEventListener('click', function() {
                    clearInterval(myInterval);
                    this.remove(stop);
                    alert.style.visibility = 'hidden';
                    button.style.visibility = 'hidden';
                    movies.style.visibility = 'visible';
                });

            });
         });





        </script>
